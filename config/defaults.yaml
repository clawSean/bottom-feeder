# ── Topic selection ──────────────────────────────────────────────
# default_topics: how many topics a routine run picks (override per-run).
# No hard cap — burn mode, fleet mode, and ad-hoc injection can exceed this.
default_topics: 1
mode: routine

# ── Fleet mode ──────────────────────────────────────────────────
# Feed a file of topics to process in bulk (one topic per line).
# topic_list_path: config/fleet-topics.txt
#
# parallelism: how many topics to research concurrently (sub-agents).
# 1 = sequential (safest, lowest resource usage).
# Set higher only when you have confirmed provider headroom.
parallelism: 1
#
# fleet_batch_size: how many topics to pull from the list per run.
# 0 or omitted = process the entire list in one run.
# fleet_batch_size: 0

# ── Budget tracking (informational only) ────────────────────────
# Budget is a SIGNAL, never a gate. If any budget script fails, the
# run continues normally. All fields below are optional hints.
#
# allow_burn_mode: false prevents accidental burn; true (default) allows it.
allow_burn_mode: true
# min_reserve_usd: stop burning when estimated remaining drops below this.
# 0 = no reserve. Only effective when balance data is actually available.
min_reserve_usd: 0
# Legacy Diem field — kept for backward compatibility with Venice setups.
# Nothing currently reads this; remove when Venice/Diem support is dropped.
# min_reserve_diem: 2.0

# Multi-profile support (optional).
# auth_profiles: 1

# Budget probe script. Runs best-effort; failures are silent.
usage_probe_script: scripts/provider-usage.sh

# ── Source defaults ─────────────────────────────────────────────
# Starting suggestions, NOT an exhaustive list. Use any available tool.
# See references/research-sources.md for full source strategy.
default_sources:
  - brave
  - knowledge-search
optional_sources:
  - perplexity
  - twitter
  - coingecko
  - coinmarketcap
  - browser

# ── Output defaults ────────────────────────────────────────────
write_topics_dir: knowledge/topics
write_research_dir: knowledge/research
max_lines_soft_cap: 300
append_update_section: true

# ── Scheduling hints ───────────────────────────────────────────
recommended_schedule_local_time: "02:30"
recommended_timezone: "America/Los_Angeles"
